<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PR Buddy Dashboard</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:white; color:red; padding:20px; font-family:monospace; z-index:9999; overflow:auto;';
        errorDiv.innerHTML = '<h3>Error: ' + message + '</h3>' +
          '<p>' + source + ':' + lineno + ':' + colno + '</p>' +
          '<pre>' + (error ? error.stack : 'No stack') + '</pre>';
        document.body.appendChild(errorDiv);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
